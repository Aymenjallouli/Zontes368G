<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Zontes 368G — Configurateur 360°</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/src/styles/main.css"/>
</head>
<body>

  <!-- ░░ INTRO ░░──────────────────────────────── -->
  <div id="intro">
    <div id="intro-content">
      <div id="intro-logo"><span class="z">Z</span><span>ONTES</span></div>
      <div id="intro-num">368G</div>
      <div id="intro-sub">ADVENTURE TOURING · 368cc</div>
    </div>
    <div id="intro-line"><div id="intro-progress"></div></div>
  </div>

  <!-- ░░ SCÈNE 360° ░░─────────────────────────── -->
  <div id="scene">

    <!-- ── Studio background ── -->
    <div id="studio-bg">
      <div id="studio-glow"></div>
      <div id="studio-floor"></div>
    </div>

    <!-- ── Viewer principal ── -->
    <div id="stage360">

      <!-- Zone de drag -->
      <div id="drag-zone"></div>

      <!-- Images injectées dynamiquement par Viewer360 -->
      <div id="frame-wrap"></div>

      <!-- Reflet sol -->
      <div id="reflect-wrap">
        <img id="img-reflect" class="reflect-img" alt="" draggable="false"/>
        <div id="reflect-fade"></div>
      </div>

      <!-- Ligne sol -->
      <div id="floor-line"></div>

    </div>

    <!-- ── HUD minimal ── -->

    <!-- Top bar -->
    <header id="hud-top">
      <div id="brand">
        <span class="z">Z</span><span>ONTES</span>
        <em>368G</em>
      </div>

      <div id="angle-wrap">
        <!-- Arc SVG rotation indicator -->
        <svg id="angle-arc" viewBox="0 0 70 70" fill="none">
          <circle cx="35" cy="35" r="28" stroke="rgba(196,154,42,.12)" stroke-width="2"/>
          <circle id="arc-fill" cx="35" cy="35" r="28"
                  stroke="#c49a2a" stroke-width="2"
                  stroke-dasharray="175.93" stroke-dashoffset="175.93"
                  stroke-linecap="round"
                  style="transform-origin:35px 35px;transform:rotate(-90deg);transition:stroke-dashoffset .1s linear"/>
          <circle cx="35" cy="35" r="3" fill="#c49a2a" opacity=".7"/>
        </svg>
        <span id="angle-label">FACE AVANT</span>
      </div>

      <div id="hud-right">
        <button id="btn-specs">FICHE TECHNIQUE</button>
      </div>
    </header>

    <!-- Bottom HUD -->
    <footer id="hud-bottom">

      <!-- Flèches + hint -->
      <div id="nav-controls">
        <button class="arrow-btn" id="btn-prev">
          <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>

        <div id="drag-hint">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          <span>GLISSER POUR PIVOTER</span>
          <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </div>

        <button class="arrow-btn" id="btn-next">
          <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
      </div>


      <!-- Zoom controls -->
      <div id="zoom-controls">
        <button class="zoom-btn" id="btn-zoom-out" title="Dézoomer (-)">
          <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
        <button class="zoom-btn" id="btn-zoom-reset" title="Réinitialiser zoom (0)">
          <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        </button>
        <button class="zoom-btn" id="btn-zoom-in" title="Zoomer (+)">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </div>

      <!-- FABs -->
      <div id="hud-fabs">
        <button class="fab" id="fab-sound" title="Son moteur">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </button>
        <button class="fab" id="fab-fs" title="Plein écran">
          <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>

    </footer>

    <!-- Hotspots layer -->
    <div id="hs-layer"></div>

    <!-- Panel fiche technique -->
    <aside id="specs-panel">
      <div id="specs-header">
        <div>
          <p id="specs-brand">ZONTES</p>
          <h2 id="specs-model">368G ADV</h2>
        </div>
        <button id="btn-close-specs">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="specs-body"></div>
    </aside>

  </div><!-- #scene -->

  <script type="module" src="/src/main.js"></script>
</body>
</html>
